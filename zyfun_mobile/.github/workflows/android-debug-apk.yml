name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/android-debug-apk.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/android-debug-apk.yml'

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyfun-mobile-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Publish build summary
        run: |
          echo "## Android Debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo 'Built file: `build/app/outputs/flutter-apk/app-debug.apk`' >> "$GITHUB_STEP_SUMMARY"
          echo 'Artifact name: `zyfun-mobile-debug-apk`' >> "$GITHUB_STEP_SUMMARY"
